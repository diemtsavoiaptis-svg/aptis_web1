<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seed Firebase - Điểm TSA Với Aptis</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="question-card">
      <p class="eyebrow">Admin Tool</p>
      <h1>Đẩy dữ liệu đề lên Firestore</h1>
      <p class="audio-hint">Chỉ dùng sau khi đã điền `firebase-config.js` và bật Email/Password Auth trong Firebase.</p>

      <div class="audio-box">
        <label>Email admin</label>
        <input id="emailInput" class="auth-input" type="email" autocomplete="username" placeholder="admin@example.com">
        <label>Mật khẩu</label>
        <input id="passwordInput" class="auth-input" type="password" autocomplete="current-password" placeholder="Mật khẩu Firebase Auth">
        <button id="seedBtn" class="primary-btn" type="button">Đăng nhập và đẩy Part 1</button>
      </div>

      <pre id="logBox" class="notice">Sẵn sàng.</pre>
    </section>
  </main>

  <script type="module" src="./seed.js"></script>
</body>
</html>
